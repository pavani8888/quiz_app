<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Quiz App</h1>
    <div class="quiz_container"  id="quiz">
        <p id="count"></p>
        <div class="quiz-header" >
            <h2 id="question">first question</h2>
            <ul>
                <li><input type="radio" name="options" id="a" class="answer">
                    <label for="a" class="op_label" id="a_text">option1</label>
                </li>

                <li><input type="radio" name="options" id="b" class="answer">
                    <label for="b" class="op_label" id="b_text">option1</label>
                </li>
                <li><input type="radio" name="options" id="c" class="answer">
                <label for="c" class="op_label" id="c_text">option1</label>
                </li>
                <li><input type="radio" name="options" id="d" class="answer">
                <label for="d" class="op_label" id="d_text">option1</label>
                </li>
            </ul>
            <div class="action">
                <button id="prev">previous</button>
                <button id="next">Next</button>
                <button id="submit">submit</button>
                <button id="rel" onclick="location.reload()">Reload</button>
            </div>
        </div>
       
    </div>
     <div id="result">
            <h2 id="score"></h2>
            <div class="action">
                <button id="reload" onclick="location.reload()">Reload</button>
                <button id="showans" onclick="showan()">Show Answers</button>
            </div>
        </div>
        <div id="warn"><p id="msg">pleace Enter option</p></div>
    <script src="script.js"></script>
</body>
</html>
